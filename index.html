<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Arkova — Secure document verification platform. Anchor credentials to an immutable record and verify them instantly." />
    <meta name="theme-color" content="#00d4ff" />

    <!-- SEC-008: Content Security Policy (dev fallback — production CSP in vercel.json) -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://*.stripe.com https://*.run.app https://*.railway.app https://*.arkova.ai http://localhost:* ws://localhost:*;
      frame-src 'self' https://*.stripe.com;
      worker-src 'self' blob:;
      object-src 'none';
      frame-ancestors 'none';
      base-uri 'self'" />

    <!-- Google Fonts: Inter + Space Grotesk (Synthetic Sentinel design system) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/arkova-icon.png" />
    <link rel="apple-touch-icon" href="/arkova-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Arkova — Secure Document Verification" />
    <meta property="og:description" content="Anchor credentials to an immutable record and verify them instantly." />
    <meta property="og:image" content="https://app.arkova.ai/og-image.png" />
    <meta property="og:url" content="https://app.arkova.ai" />
    <meta property="og:site_name" content="Arkova" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arkova — Secure Document Verification" />
    <meta name="twitter:description" content="Anchor credentials to an immutable record and verify them instantly." />
    <meta name="twitter:image" content="https://app.arkova.ai/og-image.png" />

    <title>Arkova</title>

    <!-- Structured Data: Organization + WebSite (GEO-05) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Arkova",
      "url": "https://arkova.ai",
      "logo": "https://app.arkova.ai/arkova-logo.png",
      "description": "Privacy-first document verification platform. Anchor credentials to an immutable public record and verify them instantly.",
      "@id": "https://arkova.ai/#org",
      "sameAs": [
        "https://www.wikidata.org/wiki/Q138765025",
        "https://www.linkedin.com/company/arkovatech",
        "https://x.com/arkovatech",
        "https://www.youtube.com/channel/UCTTDFFSLxl85omCeJ9DBvrg",
        "https://github.com/carson-see/ArkovaCarson"
      ],
      "foundingDate": "2025",
      "founder": [
        { "@id": "https://arkova.ai/#carson-seeger" },
        { "@id": "https://arkova.ai/#sarah-rushton" },
        { "@id": "https://arkova.ai/#yaacov-petscher" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tallahassee",
        "addressRegion": "FL",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@arkova.ai",
        "contactType": "customer support"
      },
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "value": 3
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Arkova",
      "url": "https://app.arkova.ai",
      "description": "Secure document verification platform — anchor credentials to an immutable record and verify them instantly.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://app.arkova.ai/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Arkova",
      "url": "https://app.arkova.ai",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Privacy-first document verification platform. Anchor credentials to an immutable public record and verify them instantly. Documents never leave the user's device.",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "99",
        "priceCurrency": "USD",
        "offerCount": "3"
      },
      "featureList": [
        "Client-side SHA-256 cryptographic fingerprinting",
        "Public verification via shareable links and QR codes",
        "AI-powered credential metadata extraction",
        "REST API with batch verification",
        "PDF proof certificates",
        "Bulk CSV credential anchoring",
        "Webhook notifications",
        "MCP server for AI agent access"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

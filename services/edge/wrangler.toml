# Arkova Edge Workers — Cloudflare Worker Configuration
# ADR: docs/confluence/15_zero_trust_edge_architecture.md
# Stories: INFRA-02 through INFRA-05, P8-S7, P8-S13, P8-S15, P8-S17
#
# These workers handle PERIPHERAL edge tasks only.
# Core anchor processing, Stripe webhooks, and cron stay in services/worker/.

name = "arkova-edge"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

# ── Route: edge.arkova.ai/* ────────────────────────────────────────────
[[routes]]
pattern = "edge.arkova.ai/*"
zone_name = "arkova.ai"

# ── R2 Storage (INFRA-03 / P8-S15) — requires R2 enabled in dashboard ──
# [[r2_buckets]]
# binding = "ARKOVA_REPORTS"
# bucket_name = "arkova-reports"

# ── Queues (INFRA-04 / P8-S13) — requires Queues enabled in dashboard ─
# [[queues.producers]]
# queue = "arkova-batch-queue"
# binding = "ARKOVA_BATCH_QUEUE"
#
# [[queues.consumers]]
# queue = "arkova-batch-queue"
# max_batch_size = 10
# max_batch_timeout = 30

# ── Workers AI (INFRA-05 / P8-S17) ────────────────────────────────────
[ai]
binding = "ARKOVA_AI"

# ── Environment Variables ──────────────────────────────────────────────
[vars]
ENABLE_AI_FALLBACK = "false"
CF_AI_MODEL = "@cf/nvidia/nemotron"

# ── Secrets (set via `wrangler secret put`) ────────────────────────────
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# BASE_RPC_URL                    # Base L2 RPC endpoint (e.g., Alchemy, Infura)

# ── x402 Payment Facilitator ──────────────────────────────────────────
# Route: /x402/verify — verifies USDC transfers on BASE chain
# Set these secrets for production:
#   wrangler secret put BASE_RPC_URL
#   wrangler secret put ARKOVA_USDC_ADDRESS
#   wrangler secret put USDC_CONTRACT_ADDRESS
#
# Base Mainnet USDC: 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
# Base Sepolia USDC: 0x036cbd53842c5426634e7929541ec2318f3dcf7e

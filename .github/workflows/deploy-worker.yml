name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'services/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

env:
  PROJECT_ID: arkova1
  REGION: us-central1
  SERVICE_NAME: arkova-worker
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: arkova-worker-images

jobs:
  pre-deploy-checks:
    name: Pre-deploy Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 20
          cache: npm
          # Cache both root and worker lockfiles — root deps (tsx) are
          # required for the `Copy lint` step, which runs the repo-root
          # script `scripts/check-copy-terms.ts`.
          cache-dependency-path: |
            package-lock.json
            services/worker/package-lock.json

      - name: Install worker dependencies
        working-directory: services/worker
        run: npm ci

      - name: Typecheck
        working-directory: services/worker
        run: npx tsc --noEmit

      - name: Lint
        working-directory: services/worker
        # SCRUM-1250 (R0-4): use `npm run lint` so the deploy gate consumes
        # the exact same eslint invocation as services/worker/package.json#lint
        # — which is what CI's typecheck-lint job runs. Previously this was an
        # inlined `npx eslint src/ --max-warnings 0` that drifted from the
        # worker's `'warn'` rule defaults, causing every push since SCRUM-1227
        # landed (2026-04-25 02:54) to fail deploy on pre-existing warnings.
        # Followup R4 story tracks driving the warning count to zero.
        run: npm run lint

      # Cache the compiled zk circuit artifacts (~30 MB) keyed on circuit
      # source + circomlib version + build script. Cache hit skips the
      # ~30s circom compile + plonk setup; cache miss rebuilds from source.
      # Mirrors ci.yml so the deploy gate has the same artifacts available
      # to `npm test` as ci.yml does — without this, src/ai/zk-proof.test.ts
      # throws at module load and blocks every deploy. PR #693 added the
      # circuit build to ci.yml + dropped the conditional skip in the test
      # but missed deploy-worker.yml; this restores parity.
      - name: Cache zk circuit artifacts
        id: cache-zk-artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: services/worker/circuits/artifacts
          key: zk-artifacts-${{ runner.os }}-circom2.1.9-${{ hashFiles('services/worker/circuits/extraction-proof.circom', 'services/worker/circuits/build.sh', 'services/worker/package-lock.json') }}

      - name: Install circom (cache miss only)
        if: steps.cache-zk-artifacts.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          CIRCOM_VERSION=v2.1.9
          mkdir -p "$HOME/.local/bin"
          curl -fsSL --retry 5 -o "$HOME/.local/bin/circom" \
            "https://github.com/iden3/circom/releases/download/${CIRCOM_VERSION}/circom-linux-amd64"
          echo "e5575829252d763b7818049df9de2ef9304df834697de77fa63ce7babc23c967  $HOME/.local/bin/circom" | sha256sum -c -
          chmod +x "$HOME/.local/bin/circom"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build zk circuit artifacts (cache miss only)
        if: steps.cache-zk-artifacts.outputs.cache-hit != 'true'
        working-directory: services/worker
        run: npm run build:circuit

      - name: Verify zk circuit artifacts present
        run: |
          ls -lh services/worker/circuits/artifacts/extraction-proof_js/extraction-proof.wasm
          ls -lh services/worker/circuits/artifacts/extraction-proof_final.zkey
          ls -lh services/worker/circuits/artifacts/verification_key.json

      - name: Test
        working-directory: services/worker
        run: npm test

      - name: Install root dependencies (for lint:copy)
        # `lint:copy` runs from the repo root and shells out to `tsx`,
        # which lives in root devDependencies. Without this step the
        # deploy gate fails with `sh: 1: tsx: not found` (exit 127).
        # Mirrors ci.yml which installs root deps before invoking the
        # same script. Drift between the two caused every push to main
        # since 2026-04-26 11:45 UTC to fail the deploy gate.
        run: npm ci --no-audit --no-fund

      - name: Copy lint
        run: npm run lint:copy

  deploy:
    name: Build & Deploy (canary → full)
    needs: pre-deploy-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Login to Artifact Registry
        run: gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin ${{ env.REGISTRY }}

      - name: Build Docker image
        working-directory: services/worker
        # SCRUM-1247 (R0-1): pass --build-arg BUILD_SHA so the image's
        # /health endpoint can report the deployed git SHA. Without this
        # arg the Dockerfile defaults BUILD_SHA=unknown which is what
        # the revision-drift workflow expects to alert on.
        run: |
          docker build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest"

      - name: Clear conflicting env/secret types
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --remove-secrets CRON_SECRET \
            --remove-env-vars CRON_SECRET \
            --quiet 2>/dev/null || true

      - name: Deploy canary (no traffic)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --port 3001 \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 2 \
            --max-instances 10 \
            --timeout 3600 \
            --tag canary \
            --no-traffic \
            --set-secrets "SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,SUPABASE_JWT_SECRET=supabase-jwt-secret:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,BITCOIN_TREASURY_WIF=bitcoin-treasury-wif:latest,SENTRY_DSN=sentry-dsn:latest,API_KEY_HMAC_SECRET=api-key-hmac-secret:latest,GEMINI_API_KEY=gemini-api-key:latest,CRON_SECRET=cron-secret:latest,RESEND_API_KEY=resend-api-key:latest,TOGETHER_API_KEY=together-api-key:latest,COURTLISTENER_API_TOKEN=courtlistener-api-token:latest,OPENSTATES_API_KEY=openstates-api-key:latest,BITCOIN_RPC_URL=bitcoin-rpc-url:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,RUNPOD_API_KEY=runpod-api-key:latest,EDGAR_USER_AGENT=edgar-user-agent:latest,SAM_GOV_API_KEY=sam-gov-api-key:latest,CLOUDFLARE_API_TOKEN=cloudflare-api-token:latest,CLOUDFLARE_TUNNEL_TOKEN=cloudflare-tunnel-token:latest,GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest" \
            --set-env-vars "^||^NODE_ENV=production||LOG_LEVEL=info||BITCOIN_NETWORK=mainnet||ENABLE_PROD_NETWORK_ANCHORING=true||USE_MOCKS=false||FRONTEND_URL=https://app.arkova.ai||CORS_ALLOWED_ORIGINS=https://app.arkova.ai,https://arkova-carson.vercel.app,https://arkova-26.vercel.app||AI_PROVIDER=gemini||ENABLE_AI_EXTRACTION=true||ENABLE_SEMANTIC_SEARCH=true||ENABLE_AI_FRAUD=true||ENABLE_AI_REPORTS=true||CRON_OIDC_AUDIENCE=https://arkova-worker-270018525501.us-central1.run.app||KMS_PROVIDER=gcp||GCP_KMS_KEY_RESOURCE_NAME=projects/arkova1/locations/global/keyRings/arkova-signing/cryptoKeys/bitcoin-mainnet/cryptoKeyVersions/1||ENABLE_VERIFICATION_API=true||BATCH_ANCHOR_MAX_SIZE=10000||X402_FACILITATOR_URL=https://edge.arkova.ai/x402/verify||X402_NETWORK=eip155:84532||BITCOIN_UTXO_PROVIDER=mempool||BITCOIN_FEE_STRATEGY=mempool||TOGETHER_MODEL=carson_6cec/Meta-Llama-3.1-8B-Instruct-Reference-arkova-nessie-e3cda031" \
            --quiet

      - name: Smoke test canary revision
        # Two bugs in the original implementation (introduced 2026-04-25 in
        # adc654d2) caused this step to never actually exercise the canary:
        #   1. `--format='value(status.traffic[tag=canary].url)'` returned empty
        #      because gcloud's `value()` projection does not support
        #      tag-filter subscripts on arrays. The script then fell back to
        #      the main service URL — which routes to whatever has live
        #      traffic, NOT the new no-traffic canary.
        #   2. The assertion `.status == "ok"` never matched. /health returns
        #      `{"status": "healthy" | "degraded"}` (services/worker/src/
        #      routes/health.ts:212). It has never returned "ok".
        # Together these caused the deploy of PR #584 (sha ebd42e00) to fail
        # smoke test against live (healthy) prod, blocking the unblock that
        # PR was meant to deliver.
        # Fix: extract the canary tag URL via --format=json + jq, fail fast
        # if absent (don't silently retest live), and assert the actual
        # contract (`status: healthy`).
        run: |
          CANARY_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format=json \
            | jq -r '.status.traffic[]? | select(.tag=="canary") | .url')
          if [ -z "$CANARY_URL" ] || [ "$CANARY_URL" = "null" ]; then
            echo "ERROR: canary tag URL not found on service. Refusing to fall back to live URL."
            gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region=${{ env.REGION }} \
              --project=${{ env.PROJECT_ID }} \
              --format=json | jq '.status.traffic' || true
            exit 1
          fi
          echo "Canary URL: ${CANARY_URL}"
          for i in 1 2 3; do
            BODY=$(curl -sf --max-time 10 "${CANARY_URL}/health" || echo "")
            if [ -n "$BODY" ] && echo "$BODY" | jq -e '.status == "healthy"' >/dev/null; then
              echo "Canary health check passed (attempt $i)"
              echo "Response: $BODY"
              exit 0
            fi
            echo "Canary health check attempt $i failed (body: ${BODY:-<empty>}), retrying in 5s..."
            sleep 5
          done
          echo "Canary health check failed after 3 attempts — aborting deploy"
          exit 1

      - name: Promote canary to full traffic
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --to-latest \
            --quiet

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service URL: ${URL}"
          echo "Checking health endpoint..."
          curl -sf "${URL}/health" | jq .

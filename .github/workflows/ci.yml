name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Secret scanning - block commits containing secrets
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d # v3.93.8
        with:
          extra_args: --only-verified

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency scanning - check for vulnerable packages
  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production dependencies)
        run: npm audit --audit-level=high --omit=dev

  # Type checking and linting
  typecheck-lint:
    name: TypeCheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (full)
        run: npm run typecheck

      - name: TypeScript build check (Vercel-safe)
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Lint UI copy terms
        run: npm run lint:copy

  # Verify generated types are up to date
  types-check:
    name: Generated Types Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 1.123.0

      - name: Start Supabase
        run: supabase start

      - name: Generate types
        run: npm run gen:types

      - name: Check for uncommitted type changes
        run: |
          if [[ -n $(git status --porcelain src/types/database.types.ts) ]]; then
            echo "Error: Generated types differ from committed version"
            echo "Run 'npm run gen:types' and commit the changes"
            git diff src/types/database.types.ts
            exit 1
          fi

  # Run tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [typecheck-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 1.123.0

      - name: Start Supabase
        run: supabase start

      - name: Run database reset
        run: supabase db reset

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run worker tests with coverage
        working-directory: services/worker
        run: |
          npm ci
          npm run test:coverage

  # End-to-end tests
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typecheck-lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 1.123.0

      - name: Start Supabase
        run: supabase start

      - name: Seed database
        run: supabase db reset

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_SUPABASE_URL: http://127.0.0.1:54321
          E2E_SUPABASE_SERVICE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

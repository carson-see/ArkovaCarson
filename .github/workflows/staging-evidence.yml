name: Staging Soak Evidence

# Required PR-only gate. CLAUDE.md §1.11 / §1.12.
#
# Validates that every PR declares a soak tier in its body and provides
# the evidence fields appropriate for that tier. Path-based detector
# blocks under-declaration (e.g. PR touches services/worker/src/chain/
# but declares T1).
#
# Override label: staging-soak-skip — for true CI-only / docs-only
# changes that do not run on the worker.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches: [main, staging, develop]
    paths-ignore:
      - 'LICENSE'
      - '.gitignore'
      - 'README.md'
      - 'memory/**.md'

concurrency:
  group: staging-evidence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging-evidence:
    name: Staging Soak Evidence Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      BASE_REF_SHA: ${{ github.event.pull_request.base.sha }}
      PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install root dependencies (typescript + tsx + supabase-js)
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run staging-evidence check
        run: npx tsx scripts/ci/check-staging-evidence.ts

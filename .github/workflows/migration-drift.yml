# Migration Drift Check — Option A (read-only)
#
# Prevents the scorecard-outage class of bug (BUG-2026-04-18-004/005 +
# BUG-2026-04-19-001) where code merges to main depending on a migration
# that hasn't been applied to prod yet.
#
# Reads the local `supabase/migrations/*.sql` file list + compares against
# prod's applied-migrations set. Fails if any local file is missing in prod.
#
# Write permission NOT required. Read-only against Supabase Management API.
#
# Jira: SCRUM-908 (PROD-DRIFT-01)
# Runbook: docs/runbooks/migration-drift-playbook.md
# ADR: docs/confluence/16_migration_drift_prevention.md

name: Migration Drift Check

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migration-drift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migration-drift.yml'
      - 'scripts/ci/check-prod-drain-function.py'

# Cancel stale runs on the same branch — no reason to keep a drift-check
# running when a newer commit has replaced it.
concurrency:
  group: migration-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check supabase/migrations vs prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      # Read-only. No write anywhere.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: gcp-auth
        name: Authenticate to GCP via Workload Identity Federation
        continue-on-error: true
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - id: supabase-management-token
        name: Pull Supabase Management API token from GCP Secret Manager
        if: steps.gcp-auth.outcome == 'success'
        continue-on-error: true
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |
            token:arkova1/supabase-access-token

      - name: Diff local migrations vs Supabase Management API
        # Skips the drift check gracefully when SUPABASE_ACCESS_TOKEN is not
        # provisioned (e.g., forks, Dependabot PRs). Without a token the check
        # emits an informational summary + passes — never blocks on secret
        # availability.
        env:
          # Supabase Management API token for an account with access to this
          # project. Do not use anon/service_role JWTs, database passwords, or
          # project API keys here. Fine-grained tokens need
          # database_migrations_read and database_read.
          # Preferred source: GCP Secret Manager `arkova1/supabase-access-token`.
          # Fallback: legacy GitHub Actions secret SUPABASE_ACCESS_TOKEN.
          SUPABASE_ACCESS_TOKEN: ${{ steps.supabase-management-token.outputs.token || secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'vzwyaatejekddvltxyye' }}
        run: |
          set -eo pipefail
          auth_hint="SUPABASE_ACCESS_TOKEN must be a Supabase Management API token for an account that can read project ${SUPABASE_PROJECT_REF}; fine-grained tokens need database_migrations_read and database_read. Do not use anon/service_role JWTs, database passwords, or project API keys."

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            # For fork/Dependabot PRs the token legitimately isn't available.
            # For main-branch pushes it's an ops misconfiguration — fail loudly.
            # The 2026-04-24 migration-drift incident (SCRUM-1182) happened
            # because this block was silently passing on main for weeks while
            # SUPABASE_ACCESS_TOKEN wasn't provisioned in Actions secrets.
            if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "::error title=Migration drift check NOT RUN::SUPABASE_ACCESS_TOKEN is not configured in GitHub Actions secrets. ${auth_hint} This check cannot protect against drift until then."
              exit 1
            fi
            echo "::notice title=Migration drift check skipped::SUPABASE_ACCESS_TOKEN not set — skipping (expected for forks/Dependabot PRs; main-branch pushes fail loudly)."
            exit 0
          fi

          if [[ "${SUPABASE_ACCESS_TOKEN}" == eyJ*.*.* ]]; then
            echo "::error title=Migration drift check misconfigured::SUPABASE_ACCESS_TOKEN looks like a JWT/project API key, not a Supabase Management API token. ${auth_hint}"
            exit 1
          fi

          # Collect local migration filenames — strip extension, keep just the
          # basename so we can compare against the Supabase `name` field.
          local_names=$(ls supabase/migrations/ 2>/dev/null | grep -E '\.sql$' | sed 's/\.sql$//' | sort -u)
          if [ -z "$local_names" ]; then
            echo "::error::No local migrations found at supabase/migrations/*.sql"
            exit 1
          fi

          # Fetch prod applied migrations. Supabase Management API returns an
          # array of { version, name, ... }.
          # Capture HTTP status separately so we can distinguish auth failure
          # (token expired/revoked) from genuine API errors.
          http_status=$(curl --silent --output /tmp/prod_response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/migrations") || true
          prod_response=$(cat /tmp/prod_response.json 2>/dev/null || echo "")

          if [ "$http_status" = "401" ] || [ "$http_status" = "403" ]; then
            # Missing tokens can be expected for fork/Dependabot PRs, but a
            # configured token that cannot read prod is an operations failure.
            # Do not let migration PRs look green while the drift gate is blind.
            echo "::error title=Migration drift check auth failure::Supabase Management API returned HTTP $http_status for project ${SUPABASE_PROJECT_REF}. ${auth_hint} Verify the GitHub Actions secret value and the token owner's project/org access before replacing it."
            exit 1
          fi

          if [ "$http_status" != "200" ]; then
            echo "::error::Failed to query Supabase Management API for migrations list (HTTP $http_status)."
            echo "Response preview:"
            echo "$prod_response" | head -5
            exit 1
          fi

          # Extract names. jq filter: .[].name. Fallback: grep.
          prod_names=$(echo "$prod_response" | jq -r '.[].name' 2>/dev/null | sort -u)
          if [ -z "$prod_names" ]; then
            echo "::error::Supabase Management API returned no migrations (unexpected)."
            echo "Response body preview:"
            echo "$prod_response" | head -5
            exit 1
          fi

          # Diff: what's local but not prod?
          missing=$(comm -23 <(echo "$local_names") <(echo "$prod_names"))

          # Exempt list — see docs/runbooks/migration-drift-playbook.md §
          # "Exempt migrations" + docs/confluence/16_migration_drift_prevention.md
          # for each entry's rationale.
          #
          # Categories:
          #   (a) 0033 / 0078 / 0162 — numbered gaps that never existed as files
          #   (b) `" 2.sql"` macOS duplicate suffixes for migrations already
          #       applied in prod under the canonical name — the `.* 2$` rule
          #       tolerates the copy-paste artefact pending a repo-level cleanup
          #   (c) 0186 / 0212..0216 — applied under 2026041X version strings
          #       in prod's schema_migrations (migrations were pushed before
          #       the current naming convention was stable); the filenames
          #       exist but the names in prod don't match 1:1
          #   (d) 0190 RLS subquery caching + 0191 BRIN on anchors —
          #       intentionally held back for a maintenance window
          #       (tracked in SCRUM-908)
          exempt_regex='^(0033|0078|0162|.* 2|0186_.*|0190_.*|0191_.*|0212_.*|0213_.*|0214_.*|0215_.*|0216_.*|0216b_.*)$'
          filtered_missing=$(echo "$missing" | grep -vE "$exempt_regex" || true)

          missing_count=$(echo "$filtered_missing" | grep -c . || true)

          echo "## Migration drift check"
          echo "- Local migrations: $(echo "$local_names" | wc -l | tr -d ' ')"
          echo "- Prod applied:    $(echo "$prod_names"  | wc -l | tr -d ' ')"
          echo "- Missing in prod: $missing_count"

          if [ "$missing_count" -gt 0 ]; then
            echo ""
            echo "::error title=Migrations missing in prod::The following migrations exist in supabase/migrations/ but have NOT been applied to prod:"
            echo "$filtered_missing" | sed 's/^/  - /'
            echo ""
            echo "Resolution (see docs/runbooks/migration-drift-playbook.md):"
            echo "  1. Review each missing migration for risk."
            echo "  2. Apply via Supabase MCP, \`supabase db push\`, or operator runbook."
            echo "  3. Re-run this check."
            echo ""
            echo "If a migration is intentionally held back (e.g., locks a hot table"
            echo "and needs a maintenance window), add it to the exempt_regex in"
            echo ".github/workflows/migration-drift.yml with a code comment explaining why."
            exit 1
          fi

          echo "::notice title=Migration drift check passed::All local migrations are applied in prod."

      - name: Check prod drain function body and grants
        if: ${{ hashFiles('supabase/migrations/0283_drain_submitted_to_secured_helper.sql') != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ steps.supabase-management-token.outputs.token || secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'vzwyaatejekddvltxyye' }}
        run: python3 scripts/ci/check-prod-drain-function.py

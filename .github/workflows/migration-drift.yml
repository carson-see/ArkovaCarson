# Migration Drift Check — Option A (read-only)
#
# Prevents the scorecard-outage class of bug (BUG-2026-04-18-004/005 +
# BUG-2026-04-19-001) where code merges to main depending on a migration
# that hasn't been applied to prod yet.
#
# Reads the local `supabase/migrations/*.sql` file list + compares against
# prod's applied-migrations set. Fails if any local file is missing in prod.
#
# Write permission NOT required. Read-only against Supabase Management API.
#
# Jira: SCRUM-908 (PROD-DRIFT-01)
# Runbook: docs/runbooks/migration-drift-playbook.md
# ADR: docs/confluence/16_migration_drift_prevention.md

name: Migration Drift Check

on:
  # This workflow is a required branch-protection context. It must run on every
  # PR/main push; path filters leave non-migration PRs permanently blocked with
  # a missing required check.
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on the same branch — no reason to keep a drift-check
# running when a newer commit has replaced it.
concurrency:
  group: migration-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check supabase/migrations vs prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      # Read-only. No write anywhere.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Skip prod drift check for Dependabot secretless PRs
        if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
        run: |
          echo "::notice title=Migration drift check skipped for Dependabot::Dependabot pull_request runs do not receive the GCP Workload Identity secrets required for this read-only prod drift check. Non-Dependabot PRs and main pushes still run the full Supabase Management API comparison."

      - id: gcp-auth
        name: Authenticate to GCP via Workload Identity Federation
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - id: supabase-management-token
        name: Pull Supabase Management API token from GCP Secret Manager
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |
            token:arkova1/supabase_access

      - name: Diff local migrations vs Supabase Management API
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        env:
          # Supabase Management API token for an account with access to this
          # project. Do not use anon/service_role JWTs, database passwords, or
          # project API keys here. Fine-grained tokens need
          # database_migrations_read and database_read.
          # Source: GCP Secret Manager `arkova1/supabase_access`.
          SUPABASE_ACCESS_TOKEN: ${{ steps.supabase-management-token.outputs.token }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'vzwyaatejekddvltxyye' }}
        run: |
          set -eo pipefail
          auth_hint="SUPABASE_ACCESS_TOKEN must be a Supabase Management API token for an account that can read project ${SUPABASE_PROJECT_REF}; fine-grained tokens need database_migrations_read and database_read. Do not use anon/service_role JWTs, database passwords, or project API keys."

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            # The 2026-04-24 migration-drift incident (SCRUM-1182) happened
            # because the gate silently passed while blind. Missing Secret
            # Manager access is now always a hard failure.
            echo "::error title=Migration drift check NOT RUN::GCP Secret Manager did not provide arkova1/supabase_access. ${auth_hint} Grant the GitHub Actions workload identity service account secretmanager.versions.access on that secret, then rerun this check."
            exit 1
          fi

          if [[ "${SUPABASE_ACCESS_TOKEN}" == eyJ*.*.* ]]; then
            echo "::error title=Migration drift check misconfigured::SUPABASE_ACCESS_TOKEN looks like a JWT/project API key, not a Supabase Management API token. ${auth_hint}"
            exit 1
          fi

          # Collect local migration filenames — strip extension and keep the
          # full basename (for example `0001_enums`).
          local_names=$(ls supabase/migrations/ 2>/dev/null | grep -E '\.sql$' | sed 's/\.sql$//' | sort -u)
          if [ -z "$local_names" ]; then
            echo "::error::No local migrations found at supabase/migrations/*.sql"
            exit 1
          fi

          # Fetch prod applied migrations. Supabase Management API returns an
          # array of { version, name, ... }. The `name` field may omit the
          # version prefix, so normalize to the local basename shape before
          # diffing. Without this, a healthy prod history can look like a giant
          # false-positive drift list.
          # Capture HTTP status separately so we can distinguish auth failure
          # (token expired/revoked) from genuine API errors.
          http_status=$(curl --silent --output /tmp/prod_response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/migrations") || true
          prod_response=$(cat /tmp/prod_response.json 2>/dev/null || echo "")

          if [ "$http_status" = "401" ] || [ "$http_status" = "403" ]; then
            # Missing tokens can be expected for fork/Dependabot PRs, but a
            # configured token that cannot read prod is an operations failure.
            # Do not let migration PRs look green while the drift gate is blind.
            echo "::error title=Migration drift check auth failure::Supabase Management API returned HTTP $http_status for project ${SUPABASE_PROJECT_REF}. ${auth_hint} Verify the GitHub Actions secret value and the token owner's project/org access before replacing it."
            exit 1
          fi

          if [ "$http_status" != "200" ]; then
            echo "::error::Failed to query Supabase Management API for migrations list (HTTP $http_status)."
            echo "Response preview:"
            echo "$prod_response" | head -5
            exit 1
          fi

          # Supabase stores two pieces of migration identity:
          #   - version: sometimes Arkova's old 4-digit prefix, sometimes a
          #     Supabase timestamp from operator-applied hotfixes
          #   - name: usually the description suffix, but some historical rows
          #     already include Arkova's numeric prefix
          #
          # Treat any of these as applied:
          #   1. exact local basename:         0279_x402_payments_org_scoping
          #   2. Supabase name suffix:         x402_payments_org_scoping
          #   3. Supabase version + name:      0175_activate_user_function
          #   4. operator SCRUM prefix removed: scrum_1170_org_credits... -> org_credits...
          #
          # This prevents a giant false-missing list when prod is actually
          # ahead under timestamped Management API migrations.
          prod_migrations_jq_output=$(mktemp)
          prod_migrations_jq_error=$(mktemp)
          # CodeRabbit Major from #674: harden the parser against
          # malformed Management API rows. Without explicit checks,
          # `(.version | tostring)` silently turns a missing/null
          # `.version` into the literal string "null" and the gate
          # happily produces garbage keys, then reports every local
          # migration as missing.
          #
          # Row-level contract validation: payload must be an array;
          # each row must have a non-empty string-or-number `version`.
          # `-r` is preserved (not `-er`) so a legitimately empty array
          # still produces empty output and is caught by the `-z`
          # check below — that path is correct for fresh databases.
          if ! echo "$prod_response" | jq -r '
            if type != "array" then
              error("Supabase Management API returned non-array migrations payload")
            else
              .[]
              | if type != "object" then
                  error("migration row is not an object (got \(.))")
                elif (.version | type) != "string" and (.version | type) != "number" then
                  error("migration row missing required `version` (got \(.))")
                elif (.version | tostring) == "" then
                  error("migration row has empty `version` (row: \(.))")
                elif has("name") and .name != null and (.name | type) != "string" then
                  error("migration row `name` must be a string when present (got \(.))")
                else . end
              | (.version | tostring) as $version
              | ((.name // "") | tostring) as $name
              | if $name == "" or $name == "null" then
                  $version
                else
                  $name,
                  (if $name | startswith($version + "_") then $name else "\($version)_\($name)" end),
                  ($name | sub("^scrum_[0-9]+_"; ""))
                end
            end
          ' > "$prod_migrations_jq_output" 2>"$prod_migrations_jq_error"; then
            echo "::error title=Migration drift check parse failure::Supabase Management API returned HTTP 200, but the migrations payload could not be parsed."
            echo "jq error preview:"
            head -5 "$prod_migrations_jq_error" 2>/dev/null || true
            echo "Response body preview:"
            echo "$prod_response" | head -5
            exit 1
          fi
          prod_applied_keys=$(sort -u "$prod_migrations_jq_output")
          if [ -z "$prod_applied_keys" ]; then
            echo "::error::Supabase Management API returned no migrations (unexpected)."
            echo "Response body preview:"
            echo "$prod_response" | head -5
            exit 1
          fi

          prod_keys_file=$(mktemp)
          echo "$prod_applied_keys" > "$prod_keys_file"

          missing=$(
            while IFS= read -r local_name; do
              local_version="${local_name%%_*}"
              canonical_suffix=$(echo "$local_name" | sed -E 's/^[0-9]{4}[a-z]?_//')
              if grep -Fxq "$local_name" "$prod_keys_file" \
                || grep -Fxq "$local_version" "$prod_keys_file" \
                || grep -Fxq "$canonical_suffix" "$prod_keys_file"; then
                continue
              fi
              echo "$local_name"
            done < <(echo "$local_names")
          )

          # Exempt / verified-successor list — see
          # docs/runbooks/migration-drift-playbook.md § "Historical ledger
          # exceptions" for each entry's rationale.
          #
          # These entries are not deferrals. They are historical migrations
          # whose effects are present in prod via compensating/successor
          # migrations or operator-applied names. Do not add entries here
          # without object-level verification and a dated runbook note.
          #
          # 0287_api_key_scope_vocabulary_canonical: file was applied to prod
          # via Supabase MCP on 2026-05-03 19:26 under its original local name
          # `0285_api_key_scope_vocabulary` (prod row version
          # `20260503192636_0285_api_key_scope_vocabulary`). After application,
          # PR #671/#682 reviews renumbered the local file 0285 → 0286 (collision
          # with `0286_attestation_evidence_public_metadata`) → 0287 (this PR).
          # The prod row name is immutable; verified via Supabase MCP
          # `SELECT version, name FROM supabase_migrations.schema_migrations`.
          # The schema effects (api_keys + agents CHECK constraints on the
          # canonical scope vocabulary) ARE present in prod.
          # 0288_drive_processing_loop + 0289_suborg_suspension applied to prod
          # 2026-05-04 via Supabase MCP after PR #689 merge (verified via
          # information_schema.columns + pg_proc lookups). The exempt entries
          # for these two are kept here only because the prod ledger may still
          # show them under timestamped names rather than the canonical local
          # names; remove once the ledger is reconciled.
          # 0055b_seed_alignment_idempotent: corrective migration for the
          # 0022 prefix collision (local file `0022_seed_schema_alignment`
          # never made it to prod's ledger; prod's 0022 slot resolves to
          # `public_verification_revoked` instead). Idempotent ALTERs on prod
          # since the columns already exist; required for fresh-DB / staging-
          # branch builds to succeed past 0056. Stays exempt because applying
          # it to prod is a no-op that doesn't generate a new ledger row.
          # 00000000000000_baseline_at_main_HEAD: Path C structural baseline
          # ([SCRUM-1668](https://arkova.atlassian.net/browse/SCRUM-1668)). 14-
          # digit zero-timestamp prefix subsumes 0000..0289 historical chain
          # (now archived to docs/migrations-archive/). Repo file exists pre-
          # cutover; prod ledger row is inserted at cutover (separate gated op,
          # Carson runs during a maintenance window — see
          # docs/staging/PATH_C_CUTOVER.md). REMOVE THIS EXEMPT ENTRY in the
          # post-cutover follow-up PR once the ledger row is in place.
          exempt_regex='^(0033|0078|0162|.* 2|0022_seed_schema_alignment|0023_is_public_profile|0024_fix_search_path_revoke_anchor|0055b_seed_alignment_idempotent|0068b_submitted_status_and_confirmations|0088b_cle_templates|0135_ats_integrations|0175_fix_pipeline_stats_timeout|0180_fix_public_issuer_perf|0258_ark112_queue_public_id|0287_api_key_scope_vocabulary_canonical|0288_drive_processing_loop|0289_suborg_suspension|00000000000000_baseline_at_main_HEAD)$'
          filtered_missing=$(echo "$missing" | grep -vE "$exempt_regex" || true)

          missing_count=$(echo "$filtered_missing" | grep -c . || true)

          echo "## Migration drift check"
          echo "- Local migrations: $(echo "$local_names" | wc -l | tr -d ' ')"
          echo "- Prod applied keys: $(echo "$prod_applied_keys" | wc -l | tr -d ' ')"
          echo "- Missing in prod: $missing_count"

          if [ "$missing_count" -gt 0 ]; then
            echo ""
            # Dependabot exits in the earlier skip step; non-Dependabot PRs
            # reach this branch with Supabase credentials and run the full
            # drift check before deciding whether the missing set is PR-owned.
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              base_sha=$(jq -r '.pull_request.base.sha // empty' "$GITHUB_EVENT_PATH")
              head_sha=$(jq -r '.pull_request.head.sha // empty' "$GITHUB_EVENT_PATH")
              if [ -z "$base_sha" ] || [ -z "$head_sha" ]; then
                echo "::error title=Migration drift check event parse failure::Could not read pull request base/head SHAs from GITHUB_EVENT_PATH."
                exit 1
              fi
              if ! merge_base=$(git merge-base "$base_sha" "$head_sha"); then
                echo "::error title=Migration drift check merge-base failure::Could not find a merge base between PR base $base_sha and head $head_sha."
                exit 1
              fi
              changed_migrations=$(
                git diff --name-only --diff-filter=AMR "$merge_base" "$head_sha" -- 'supabase/migrations/*.sql' \
                  | sed 's#^supabase/migrations/##' \
                  | sed 's/\.sql$//' \
                  | sort -u
              )
              changed_missing=$(comm -12 <(echo "$filtered_missing" | sort -u) <(echo "$changed_migrations" | sort -u))
              changed_missing_count=$(echo "$changed_missing" | grep -c . || true)

              if [ "$changed_missing_count" -eq 0 ]; then
                echo "::warning title=Baseline migration drift detected::Production is missing $missing_count migrations from the base branch, but this PR does not add, modify, or rename any of those migration files. Tracking remains required via SCRUM-908; not blocking this PR on pre-existing drift."
                echo "Baseline migrations missing in prod:"
                echo "$filtered_missing" | sed 's/^/  - /'
                exit 0
              fi
            fi

            echo "::error title=Migrations missing in prod::The following migrations exist in supabase/migrations/ but have NOT been applied to prod:"
            echo "$filtered_missing" | sed 's/^/  - /'
            echo ""

            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              echo "::error title=PR migrations missing in prod::This PR adds, modifies, or renames migrations that are not applied in prod:"
              echo "$changed_missing" | sed 's/^/  - /'
              echo ""
            fi

            echo "Resolution (see docs/runbooks/migration-drift-playbook.md):"
            echo "  1. Review each missing migration for risk."
            echo "  2. Apply via Supabase MCP, \`supabase db push\`, or operator runbook."
            echo "  3. Re-run this check."
            echo ""
            echo "If a migration is intentionally held back (e.g., locks a hot table"
            echo "and needs a maintenance window), add it to the exempt_regex in"
            echo ".github/workflows/migration-drift.yml with a code comment explaining why."
            exit 1
          fi

          echo "::notice title=Migration drift check passed::All local migrations are applied in prod."

      - name: Check prod drain function body and grants
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') && hashFiles('supabase/migrations/0283_drain_submitted_to_secured_helper.sql') != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ steps.supabase-management-token.outputs.token }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'vzwyaatejekddvltxyye' }}
        run: python3 scripts/ci/check-prod-drain-function.py

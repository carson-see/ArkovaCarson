name: dependency-scan

on:
  pull_request:
    branches: [main]
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/dependency-scan.yml'
  schedule:
    - cron: '0 12 * * 1'

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  sonatype-oss-index:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - { name: root, path: . }
          - { name: worker, path: services/worker }
          - { name: edge, path: services/edge }
          - { name: embed, path: packages/embed }
    steps:
      - uses: actions/checkout@v4

      - id: gcp-auth
        name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - id: sonatype-secrets
        name: Pull Sonatype token from GCP Secret Manager
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            token:arkova1/sonatype

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace.path }}/package-lock.json

      - name: Install deps (${{ matrix.workspace.name }})
        working-directory: ${{ matrix.workspace.path }}
        run: npm ci --no-audit --no-fund

      - name: Generate dependency manifest
        working-directory: ${{ matrix.workspace.path }}
        run: |
          npm ls --all --json --omit=dev > deps.json 2>/dev/null || true
          jq '[.. | objects | select(.version) | "pkg:npm/\(.name)@\(.version)"] | unique' deps.json > purls.json
          echo "PURL count: $(jq length purls.json)"

      - name: Sonatype OSS Index scan
        id: scan
        working-directory: ${{ matrix.workspace.path }}
        env:
          SONATYPE_TOKEN: ${{ steps.sonatype-secrets.outputs.token }}
        run: |
          jq '{coordinates: .}' purls.json > req.json
          curl -sSf -H "Authorization: Bearer $SONATYPE_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST https://ossindex.sonatype.org/api/v3/component-report \
            -d @req.json > report.json
          HIGH=$(jq '[.[] | .vulnerabilities[]? | select((.cvssScore // 0) >= 7)] | length' report.json)
          MED=$(jq '[.[] | .vulnerabilities[]? | select((.cvssScore // 0) >= 4 and (.cvssScore // 0) < 7)] | length' report.json)
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "medium=$MED" >> "$GITHUB_OUTPUT"
          {
            echo "## ${{ matrix.workspace.name }} dependency scan"
            echo ""
            echo "- HIGH (CVSS ≥ 7): **$HIGH**"
            echo "- MEDIUM (CVSS 4-6.9): **$MED**"
            echo ""
            jq -r '.[] | select(.vulnerabilities | length > 0) | "- `\(.coordinates)` — \(.vulnerabilities | length) issue(s)"' report.json | head -30
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::${{ matrix.workspace.name }}: $HIGH HIGH-severity vulnerabilities — see job summary"
            exit 1
          fi

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.workspace.name }}
          path: |
            ${{ matrix.workspace.path }}/deps.json
            ${{ matrix.workspace.path }}/purls.json
            ${{ matrix.workspace.path }}/report.json
          retention-days: 90

name: Publish Python SDK

on:
  push:
    tags:
      - "arkova-py-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arkova-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Lint
        run: ruff check src tests

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/arkova-py-v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/arkova-py/dist

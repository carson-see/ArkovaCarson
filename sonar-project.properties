sonar.projectKey=carson-see_ArkovaCarson
sonar.organization=carson-see

sonar.sources=src,services/worker/src,services/edge/src
sonar.tests=src/tests,e2e
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info,services/worker/coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info,services/worker/coverage/lcov.info

sonar.cpd.exclusions=**/*.test.ts,supabase/migrations/**,services/worker/src/ai/eval/fraud-training-seed.ts,**/fraud-training-seed.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.d.ts,**/database.types.ts,services/worker/src/ai/eval/fraud-training-seed.ts

sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=supabase/migrations/**

# SCRUM-1304 — check-sonar-quality-gate.ts only ever reads SonarCloud's own
# API (auth'd via SONARCLOUD_TOKEN). The data is not user-controlled. Static
# analysis flags taint from the parsed JSON to URL construction (S8476) and
# log output (S5145), but the data path is API → script-stdout → CI log only.
# Ignore those two rules in this specific file.
sonar.issue.ignore.multicriteria.e2.ruleKey=tssecurity:S8476
sonar.issue.ignore.multicriteria.e2.resourceKey=scripts/ci/check-sonar-quality-gate.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=tssecurity:S5145
sonar.issue.ignore.multicriteria.e3.resourceKey=scripts/ci/check-sonar-quality-gate.ts

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
sonar.newCode.referenceBranch=main

# SCRUM-1304 (R0-3-FU1) — Coverage on New Code quality gate.
#
# SonarCloud built-in quality gate "Sonar way" already ships a
# new_coverage >= 80 condition and a new_duplicated_lines_density <= 3
# condition. Pin both here as documentation so a future quality-gate
# rename / fork preserves the contract. The actual enforcement is in
# the SonarCloud project's quality-gate config; this file documents
# the contract that gate must satisfy.
#
# Locked metrics:
#   - new_coverage >= 80     (Coverage on New Code)
#   - new_duplicated_lines_density <= 3 (Duplications on New Code)
#   - new_security_rating == A  (no new security hotspots)
#   - new_reliability_rating == A
#   - new_maintainability_rating == A
sonar.coverage.minimum.new=80
sonar.duplications.maximum.new=3
sonar.cpd.cross_project=false

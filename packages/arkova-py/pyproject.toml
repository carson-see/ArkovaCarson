[build-system]
requires = ["hatchling>=1.26,<2"]
build-backend = "hatchling.build"

[project]
name = "arkova"
version = "0.1.0"
description = "Typed Python SDK for the Arkova Verification API v2"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Arkova Engineering", email = "engineering@arkova.ai" }]
keywords = ["arkova", "verification", "credentials", "anchors", "api"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]
dependencies = [
  "httpx>=0.27,<1",
  "pydantic>=2.7,<3",
]

[project.optional-dependencies]
dev = [
  "build>=1.2,<2",
  "pytest>=8,<9",
  "ruff>=0.8,<1",
]

[project.urls]
Homepage = "https://arkova.ai"
Documentation = "https://arkova.ai/docs/v2"
Repository = "https://github.com/carson-see/ArkovaCarson"

[tool.hatch.build.targets.wheel]
packages = ["src/arkova"]

[tool.hatch.build.targets.wheel.force-include]
"src/arkova/py.typed" = "arkova/py.typed"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

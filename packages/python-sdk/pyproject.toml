[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arkova"
version = "0.1.0"
description = "Arkova SDK for Python — anchor and verify credentials with three function calls."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Arkova", email = "support@arkova.io" }]
keywords = ["arkova", "verification", "credentials", "blockchain", "anchor"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://arkova.io"
Documentation = "https://arkova.io/docs/sdk/python"
Repository = "https://github.com/carson-see/ArkovaCarson"
Issues = "https://github.com/carson-see/ArkovaCarson/issues"

[project.optional-dependencies]
test = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "respx>=0.21.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/arkova"]

[tool.hatch.build.targets.sdist]
include = [
  "src/arkova",
  "README.md",
  "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

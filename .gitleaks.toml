# Gitleaks configuration for Arkova
# See: https://github.com/gitleaks/gitleaks#configuration
# SEC-015: Test files are no longer blanket-excluded. Use specific regex allowlists.

[extend]
# Use the default gitleaks rules as a base
useDefault = true

[allowlist]
  description = "Allow well-known Supabase local development JWTs and test fixture strings"
  # These are publicly documented default keys for local Supabase development.
  # They are NOT real secrets — they only work with the local dev instance.
  # See: https://supabase.com/docs/guides/local-development
  commits = [
    "9710074050c09cc26152ddbe9033601f01126b9d",
  ]
  regexes = [
    # Supabase local dev JWT (anon key) — publicly documented, not a secret
    '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24''',
    # Supabase local dev JWT (service_role key) — publicly documented
    '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSI''',
    # Test fixture API key prefixes (ak_test_)
    '''ak_test_[a-f0-9]{16,}''',
    # Mock/test HMAC secrets used in test fixtures
    '''test-hmac-secret''',
    # Mock/test CRON secrets used in test fixtures (SCRUM-534 config tests)
    '''test-cron-secret''',
    # Supabase local dev URL
    '''http://127\.0\.0\.1:54321''',
    # Documentation placeholder API keys (ak_live_...)
    '''ak_live_\.\.\.''',
    # Documentation example webhook secret (dummy hex in example JSON response)
    '''9f8e7d6c5b4a39281706f5e4d3c2b1a0''',
  ]
  paths = [
    # API documentation contains example curl commands with placeholder credentials
    '''docs/api/.*\.md$''',
  ]

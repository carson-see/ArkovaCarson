# Gitleaks configuration for Arkova
# See: https://github.com/gitleaks/gitleaks#configuration
# SEC-015: Test files are no longer blanket-excluded. Use specific regex allowlists.
# DEP-14 (SCRUM-1004): Custom Arkova secret patterns added 2026-04-22.

[extend]
# Use the default gitleaks rules as a base
useDefault = true

# --- Custom Arkova secret patterns ---

[[rules]]
  id = "arkova-treasury-wif"
  description = "Bitcoin Treasury WIF private key"
  regex = '''BITCOIN_TREASURY_WIF\s*=\s*['"]?[5KL][1-9A-HJ-NP-Za-km-z]{50,51}['"]?'''
  tags = ["arkova", "bitcoin", "critical"]

[[rules]]
  id = "arkova-hmac-secret"
  description = "Arkova API Key HMAC Secret (non-test)"
  regex = '''API_KEY_HMAC_SECRET\s*=\s*['"]?[a-f0-9]{32,}['"]?'''
  tags = ["arkova", "hmac", "critical"]

[[rules]]
  id = "arkova-kms-key-id"
  description = "GCP/AWS KMS Key Resource Name"
  regex = '''(KMS_KEY_ID|KMS_KEY_RESOURCE_NAME)\s*=\s*['"]?(projects/|arn:aws:kms:)[^'"]+['"]?'''
  tags = ["arkova", "kms", "high"]

[[rules]]
  id = "arkova-stripe-secret"
  description = "Stripe secret key (live)"
  regex = '''sk_live_[a-zA-Z0-9]{24,}'''
  tags = ["arkova", "stripe", "critical"]

[[rules]]
  id = "arkova-stripe-webhook-secret"
  description = "Stripe webhook signing secret (live)"
  regex = '''whsec_[a-zA-Z0-9]{24,}'''
  tags = ["arkova", "stripe", "high"]

[[rules]]
  id = "arkova-supabase-service-role"
  description = "Supabase service role key (non-local)"
  regex = '''SUPABASE_SERVICE_ROLE_KEY\s*=\s*['"]?eyJ[a-zA-Z0-9_-]{100,}['"]?'''
  tags = ["arkova", "supabase", "critical"]

[[rules]]
  id = "arkova-sentry-dsn"
  description = "Sentry DSN with auth token"
  regex = '''https://[a-f0-9]{32}@[a-z0-9]+\.ingest\.sentry\.io/[0-9]+'''
  tags = ["arkova", "sentry", "medium"]

[allowlist]
  description = "Allow well-known Supabase local development JWTs and test fixture strings"
  # These are publicly documented default keys for local Supabase development.
  # They are NOT real secrets — they only work with the local dev instance.
  # See: https://supabase.com/docs/guides/local-development
  commits = [
    "9710074050c09cc26152ddbe9033601f01126b9d",
  ]
  regexes = [
    # Supabase local dev JWT (anon key) — publicly documented, not a secret
    '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24''',
    # Supabase local dev JWT (service_role key) — publicly documented
    '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSI''',
    # Test fixture API key prefixes (ak_test_)
    '''ak_test_[a-f0-9]{16,}''',
    # Mock/test HMAC secrets used in test fixtures
    '''test-hmac-secret''',
    # Mock/test CRON secrets used in test fixtures (SCRUM-534 config tests)
    '''test-cron-secret''',
    # Supabase local dev URL
    '''http://127\.0\.0\.1:54321''',
    # Documentation placeholder API keys (ak_live_...)
    '''ak_live_\.\.\.''',
    # Documentation example webhook secret (dummy hex in example JSON response)
    '''9f8e7d6c5b4a39281706f5e4d3c2b1a0''',
  ]
  paths = [
    # API documentation contains example curl commands with placeholder credentials
    '''docs/api/.*\.md$''',
    # Env var reference — templates with empty values, not real secrets
    '''docs/reference/ENV\.md$''',
  ]

# SonarCloud Configuration
# Exclude auto-generated files and immutable migrations from duplication analysis

# Auto-generated Supabase types (identical copies by design)
sonar.cpd.exclusions=**/database.types.ts,supabase/migrations/**

# Exclude migration files from reliability analysis (immutable per project rules)
sonar.issue.ignore.multicriteria=m1
sonar.issue.ignore.multicriteria.m1.ruleKey=plsql:NullComparison
sonar.issue.ignore.multicriteria.m1.resourceKey=supabase/migrations/**

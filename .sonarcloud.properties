# SonarCloud Configuration
# Exclude auto-generated files and immutable migrations from analysis.
#
# Per CLAUDE.md §1.2 migrations are immutable; analyzing them for code-smell /
# duplication / reliability is meaningless because we cannot edit them anyway.
# The Path C baseline (00000000000000_baseline_at_main_HEAD.sql) is a pg_dump
# snapshot of prod's schema and inherently has high lexical duplication
# (repeated CREATE TABLE / ADD CONSTRAINT / GRANT patterns).

# Full exclusions: SonarCloud will not analyze these files at all.
sonar.exclusions=**/database.types.ts,supabase/migrations/**,docs/migrations-archive/**

# Belt-and-suspenders: also exclude from CPD (copy-paste detector).
sonar.cpd.exclusions=**/database.types.ts,supabase/migrations/**,docs/migrations-archive/**

# And from coverage analysis (no test coverage measured against migrations).
sonar.coverage.exclusions=**/database.types.ts,supabase/migrations/**,docs/migrations-archive/**

# Also skip a specific PL/SQL rule that would still flag if the above were
# bypassed somehow.
sonar.issue.ignore.multicriteria=m1
sonar.issue.ignore.multicriteria.m1.ruleKey=plsql:NullComparison
sonar.issue.ignore.multicriteria.m1.resourceKey=supabase/migrations/**

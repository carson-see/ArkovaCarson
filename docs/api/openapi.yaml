openapi: 3.0.3
info:
  title: Arkova Verification API
  description: |
    Privacy-first document verification anchored to Bitcoin.

    ## Authentication
    - **API Key**: Include `X-API-Key` header with your key (get one at /api/v1/keys)
    - **x402 Payment**: Include `X-Payment` header with base64-encoded payment proof
    - Some endpoints accept both methods

    ## Rate Limits
    - Anonymous: 100 req/min per IP
    - API Key: 1,000 req/min per key
    - Batch: 10 req/min
    - AI endpoints: 30 req/min per user

    Headers returned on every response:
    - `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`
    - `Retry-After` (on 429 responses)
  version: "1.0.0"
  contact:
    name: Arkova Engineering
    url: https://arkova.ai
  license:
    name: Proprietary

servers:
  - url: https://arkova-worker-270018525501.us-central1.run.app/api/v1
    description: Production
  - url: http://localhost:3001/api/v1
    description: Local development

security:
  - apiKey: []
  - x402Payment: []

paths:
  /search:
    get:
      operationId: v2UnifiedSearch
      summary: Search across organizations, records, fingerprints, and documents
      description: |
        Verification API v2 unified search endpoint. Uses an opaque cursor for pagination and returns typed results.
      tags: [Search]
      servers:
        - url: https://arkova-worker-270018525501.us-central1.run.app/api/v2
          description: Production v2
        - url: http://localhost:3001/api/v2
          description: Local development v2
      security:
        - apiKey: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 500
          description: Search query.
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [all, org, record, fingerprint, document]
            default: all
          description: Result type filter.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from `next_cursor`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchV2Response"
        "400":
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: API key required.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: API key does not have `read:search`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /verify/{publicId}:
    get:
      operationId: verifyDocument
      summary: Verify a document by public ID
      description: Returns the verification status and anchor details for a document.
      tags: [Verification]
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            example: ARK-2026-TEST-001
          description: The document's public identifier
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequired"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

  /verify/{publicId}/proof:
    get:
      operationId: getMerkleProof
      summary: Get Merkle proof for a batch-anchored document
      description: Returns the Merkle inclusion proof for independent client-side verification.
      tags: [Verification]
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merkle proof data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerkleProofResponse"
        "404":
          description: No proof available

  /verify/batch:
    post:
      operationId: batchVerify
      summary: Batch verify multiple documents
      description: Submit up to 100 public IDs for batch verification. Returns a job ID for polling.
      tags: [Verification]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_ids]
              properties:
                public_ids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: [pending]

  /verify/entity:
    get:
      operationId: entityVerify
      summary: Search records for an entity
      description: Search across all records for a specific entity (person or organization).
      tags: [Verification]
      parameters:
        - name: entity
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity verification results
        "402":
          description: Payment required

  /anchor:
    post:
      operationId: anchorDocument
      summary: Submit a document fingerprint for anchoring
      description: Submits a SHA-256 fingerprint to be anchored to Bitcoin via Merkle batch.
      tags: [Anchoring]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fingerprint]
              properties:
                fingerprint:
                  type: string
                  description: SHA-256 hash of the document
                  pattern: "^[a-fA-F0-9]{64}$"
                credential_type:
                  type: string
                  enum: [DEGREE, LICENSE, CERTIFICATE, TRANSCRIPT, CLE, PROFESSIONAL, BADGE, ATTESTATION, FINANCIAL, LEGAL, INSURANCE, SEC_FILING, PATENT, REGULATION, PUBLICATION, OTHER]
                description:
                  type: string
                  maxLength: 500
      responses:
        "201":
          description: Anchor created
          content:
            application/json:
              schema:
                type: object
                properties:
                  public_id:
                    type: string
                  status:
                    type: string
                    enum: [PENDING]
                  fingerprint:
                    type: string

  /ai/extract:
    post:
      operationId: aiExtract
      summary: Extract metadata from PII-stripped credential text
      description: Uses AI to extract structured metadata fields from credential text. Input must be PII-stripped.
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionRequest"
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"

  /ai/search:
    post:
      operationId: aiSearch
      summary: Semantic search across records
      description: Search records using natural language queries via AI embeddings.
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                limit:
                  type: integer
                  default: 10
                  maximum: 50
      responses:
        "200":
          description: Search results

  /nessie/query:
    post:
      operationId: nessieQuery
      summary: Ask Nessie a compliance question
      description: RAG-powered compliance Q&A using regulatory records.
      tags: [Nessie]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                context:
                  type: string
      responses:
        "200":
          description: Nessie response
        "402":
          description: Payment required

  /compliance/check:
    post:
      operationId: complianceCheck
      summary: Check entity against regulatory records
      tags: [Compliance]
      responses:
        "200":
          description: Compliance check result
        "402":
          description: Payment required

  /keys:
    post:
      operationId: createApiKey
      summary: Create a new API key
      description: Requires Supabase JWT authentication.
      tags: [Key Management]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: API key created (raw key returned only once)

  /usage:
    get:
      operationId: getUsage
      summary: Get API usage statistics
      tags: [Usage]
      security:
        - apiKey: []
      responses:
        "200":
          description: Usage statistics

  /attestations:
    post:
      operationId: createAttestation
      summary: Create a new attestation
      description: |
        Creates a formal attestation linking an attester to a subject with structured claims.
        The attestation is fingerprinted and queued for Bitcoin anchoring.
      tags: [Attestations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttestationRequest"
            example:
              attestation_type: VERIFICATION
              attester_name: "Acme University Registrar"
              attester_type: INSTITUTION
              attester_title: "Office of the Registrar"
              subject_type: credential
              subject_identifier: "ARK-2026-DEG-001"
              claims:
                - claim: "Degree conferred on 2025-06-15"
                  evidence: "Registrar record #R-44821"
                - claim: "GPA verified above 3.5 threshold"
              summary: "Degree conferral verified by issuing institution"
              jurisdiction: "US-CA"
              evidence:
                - evidence_type: "document"
                  fingerprint: "b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9"
                  mime: "application/pdf"
                  size: 48219
                  filename: "registrar-record.pdf"
                  description: "Registrar source record"
              expires_at: "2027-06-15T00:00:00Z"
      responses:
        "201":
          description: Attestation created and queued for anchoring
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAttestationResponse"
              example:
                public_id: "ATT-2026-VER-00042"
                attestation_id: "ATT-2026-VER-00042"
                attestation_type: VERIFICATION
                fingerprint: "b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9"
                status: "PENDING"
                created_at: "2026-03-28T12:00:00Z"
                verify_url: "https://arkova-worker-270018525501.us-central1.run.app/api/v1/attestations/ATT-2026-VER-00042"
                evidence_count: 1
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "claims must contain at least one entry"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "unauthorized"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

    get:
      operationId: listAttestations
      summary: List and filter attestations
      description: |
        Returns a paginated list of attestations. Supports filtering by status,
        attestation type, and subject identifier. Public endpoint — no auth required.
      tags: [Attestations]
      security: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, SECURED, REVOKED, EXPIRED]
          description: Filter by attestation status
        - name: attestation_type
          in: query
          schema:
            type: string
            enum: [VERIFICATION, ENDORSEMENT, AUDIT, APPROVAL, COMPLIANCE, SUPPLY_CHAIN, IDENTITY, WITNESS, CUSTOM]
          description: Filter by attestation type
        - name: subject_identifier
          in: query
          schema:
            type: string
          description: Filter by subject public ID
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
          description: Number of results per page
      responses:
        "200":
          description: Paginated list of attestations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationListResponse"
              example:
                data:
                  - public_id: "ATT-2026-VER-00042"
                    attestation_type: VERIFICATION
                    status: SECURED
                    attester_name: "Acme University Registrar"
                    subject_type: credential
                    subject_identifier: "ARK-2026-DEG-001"
                    summary: "Degree conferral verified by issuing institution"
                    created_at: "2026-03-28T12:00:00Z"
                    anchored_at: "2026-03-28T12:15:00Z"
                next_cursor: "eyJpZCI6NDJ9"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

  /attestations/{publicId}:
    get:
      operationId: getAttestation
      summary: Verify an attestation by public ID
      description: |
        Returns full attestation details including subject, attester, claims,
        chain proof, and lifecycle dates. Public endpoint — no auth required.
      tags: [Attestations]
      security: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            example: ATT-2026-VER-00042
          description: The attestation's public identifier
        - name: include
          in: query
          required: false
          schema:
            type: string
            enum: [credentials]
          description: Optional comma-separated include list. Use credentials to include the attestor credential lineage, capped at the current credential plus two parent levels. Omit this parameter to preserve the default response shape.
      responses:
        "200":
          description: Full attestation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationDetail"
              example:
                public_id: "ATT-2026-VER-00042"
                attestation_type: VERIFICATION
                status: SECURED
                subject_type: credential
                subject_identifier: "ARK-2026-DEG-001"
                attester:
                  name: "Acme University Registrar"
                  type: INSTITUTION
                  title: "Office of the Registrar"
                claims:
                  - claim: "Degree conferred on 2025-06-15"
                    evidence: "Registrar record #R-44821"
                  - claim: "GPA verified above 3.5 threshold"
                summary: "Degree conferral verified by issuing institution"
                jurisdiction: "US-CA"
                fingerprint: "b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9"
                evidence_fingerprint: "b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9"
                evidence:
                  - public_id: "AEV-ABCDEF123456"
                    id: "AEV-ABCDEF123456"
                    evidence_type: "document"
                    description: "Registrar source record"
                    fingerprint: "b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9"
                    mime: "application/pdf"
                    size: 48219
                    created_at: "2026-03-28T12:00:00Z"
                evidence_count: 1
                chain_proof:
                  tx_id: "abc123def456..."
                  block_height: 890123
                  timestamp: "2026-03-28T12:15:00Z"
                  explorer_url: "https://mempool.space/tx/abc123def456..."
                linked_credential:
                  public_id: "ARK-2026-DEG-001"
                  credential_type: "DIPLOMA"
                  verification_status: "VERIFIED"
                  verify_url: "https://arkova-worker-270018525501.us-central1.run.app/api/v1/verify/ARK-2026-DEG-001"
                attestor_credentials:
                  - public_id: "ARK-2026-DEG-001"
                    credential_type: "DIPLOMA"
                    status: "SECURED"
                    fingerprint: "f4a3b2c1f4a3b2c1f4a3b2c1f4a3b2c1f4a3b2c1f4a3b2c1f4a3b2c1f4a3b2c1"
                    version_number: 3
                    parent_public_id: "ARK-2025-DEG-001"
                    is_current: true
                    chain_proof:
                      tx_id: "abc123def456..."
                      block_height: 890123
                      timestamp: "2026-03-28T12:15:00Z"
                      explorer_url: "https://mempool.space/tx/abc123def456..."
                    record_uri: "https://arkova-worker-270018525501.us-central1.run.app/api/v1/verify/ARK-2026-DEG-001"
                issued_at: "2026-03-28T12:00:00Z"
                expires_at: "2027-06-15T00:00:00Z"
                revoked_at: null
                revocation_reason: null
                created_at: "2026-03-28T12:00:00Z"
                verify_url: "https://arkova-worker-270018525501.us-central1.run.app/api/v1/attestations/ATT-2026-VER-00042"
        "404":
          description: Attestation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "attestation not found"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

  /attestations/{publicId}/revoke:
    patch:
      operationId: revokeAttestation
      summary: Revoke an attestation
      description: |
        Revokes an attestation. Only the original attester (authenticated via JWT)
        may revoke. Revocation is permanent and anchored on-chain.
      tags: [Attestations]
      security:
        - bearerAuth: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            example: ATT-2026-VER-00042
          description: The attestation's public identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 3
                  description: Human-readable reason for revocation
            example:
              reason: "Degree was rescinded due to academic integrity violation"
      responses:
        "200":
          description: Attestation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAttestationResponse"
              example:
                public_id: "ATT-2026-VER-00042"
                status: "REVOKED"
                revoked_at: "2026-03-28T14:30:00Z"
        "400":
          description: Validation error (reason too short)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "reason must be at least 3 characters"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the original attester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "only the original attester may revoke this attestation"
        "404":
          description: Attestation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Attestation already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "attestation is already revoked"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

  /attestations/batch-verify:
    post:
      operationId: batchVerifyAttestations
      summary: Batch verify multiple attestations
      description: |
        Verify up to 100 attestations in a single request. Returns individual
        verification status for each public ID plus an aggregate summary.
      tags: [Attestations]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchVerifyAttestationsRequest"
            example:
              public_ids:
                - "ATT-2026-VER-00042"
                - "ATT-2026-END-00099"
                - "ATT-2026-AUD-00007"
      responses:
        "200":
          description: Batch verification results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchVerifyAttestationsResponse"
              example:
                results:
                  - public_id: "ATT-2026-VER-00042"
                    status: SECURED
                    attestation_type: VERIFICATION
                    attester_name: "Acme University Registrar"
                    anchored_at: "2026-03-28T12:15:00Z"
                  - public_id: "ATT-2026-END-00099"
                    status: EXPIRED
                    attestation_type: ENDORSEMENT
                    attester_name: "State Bar of California"
                    anchored_at: "2025-01-10T08:00:00Z"
                    expires_at: "2026-01-10T08:00:00Z"
                  - public_id: "ATT-2026-AUD-00007"
                    error: "not_found"
                summary:
                  total: 3
                  verified: 1
                  not_found: 1
                  expired: 1
                  revoked: 0
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                verified: false
                error: "public_ids must contain between 1 and 100 entries"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer

  /jobs/{jobId}:
    get:
      operationId: getJobStatus
      summary: Poll batch job status
      tags: [Jobs]
      security:
        - apiKey: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status and results

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: HMAC-SHA256 hashed API key
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT token
    x402Payment:
      type: apiKey
      in: header
      name: X-Payment
      description: Base64-encoded x402 payment proof

  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    SearchV2Response:
      type: object
      required: [results, next_cursor]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchV2Result"
        next_cursor:
          type: string
          nullable: true

    SearchV2Result:
      type: object
      required: [type, public_id, score, snippet]
      properties:
        type:
          type: string
          enum: [org, record, fingerprint, document]
        public_id:
          type: string
        score:
          type: number
        snippet:
          type: string
        metadata:
          type: object
          additionalProperties: true

    VerificationResult:
      type: object
      required: [verified]
      properties:
        verified:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, REVOKED, SUPERSEDED, EXPIRED, PENDING]
        issuer_name:
          type: string
        recipient_identifier:
          type: string
        credential_type:
          type: string
        issued_date:
          type: string
          format: date
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        anchor_timestamp:
          type: string
          format: date-time
        bitcoin_block:
          type: integer
          nullable: true
        network_receipt_id:
          type: string
          nullable: true
        merkle_proof_hash:
          type: string
          nullable: true
        record_uri:
          type: string
          format: uri
        jurisdiction:
          type: string
          description: Omitted when null (frozen schema)
        explorer_url:
          type: string
          format: uri
          description: Deep link to network explorer
        description:
          type: string
          description: Immutable credential description
        compliance_controls:
          type: object
          nullable: true
          additionalProperties: true
          description: >-
            API-RICH-01 (v1.5.0): Regulatory control IDs mapped to this anchor
            (SOC 2 / FERPA / HIPAA / GDPR / ISO 27001 control tags). Sourced from
            anchors.compliance_controls JSON populated by CML-02 (migration 0137).
            Enables GRC platform integration (Vanta, Drata, Anecdotes).
        chain_confirmations:
          type: integer
          nullable: true
          description: >-
            API-RICH-01: Number of Bitcoin block confirmations at anchor time.
            Useful for maturity checks ("6-confirmed?").
        parent_public_id:
          type: string
          nullable: true
          description: >-
            API-RICH-01: Public ID of the parent anchor (credential lineage —
            reissued diplomas, amended licenses). Internal anchor UUIDs are never
            exposed (Constitution 1.4).
        version_number:
          type: integer
          nullable: true
          minimum: 1
          description: >-
            API-RICH-01: Version in this anchor's lineage. Defaults to 1 for
            originals. Omitted from response when equal to 1 to keep common-case
            payloads lean; present (>= 2) when this is a successor version.
        revocation_tx_id:
          type: string
          nullable: true
          description: >-
            API-RICH-01: Bitcoin transaction ID of the revocation when status =
            REVOKED. Enables independent verification of the revocation.
        revocation_block_height:
          type: integer
          nullable: true
          description: >-
            API-RICH-01: Bitcoin block height at which revocation was anchored.
        file_mime:
          type: string
          nullable: true
          description: >-
            API-RICH-01: MIME type of the source document (client-side metadata
            only — documents themselves never leave the user's device per
            Constitution 1.6).
        file_size:
          type: integer
          nullable: true
          minimum: 0
          description: >-
            API-RICH-01: Size of the source document in bytes (client-side
            metadata only).
        error:
          type: string

    MerkleProofResponse:
      type: object
      required: [public_id, fingerprint, merkle_root, merkle_proof, verified]
      properties:
        public_id:
          type: string
        fingerprint:
          type: string
        merkle_root:
          type: string
        merkle_proof:
          type: array
          items:
            type: object
            properties:
              hash:
                type: string
              position:
                type: string
                enum: [left, right]
        tx_id:
          type: string
          nullable: true
        block_height:
          type: integer
          nullable: true
        block_timestamp:
          type: string
          format: date-time
          nullable: true
        batch_id:
          type: string
          nullable: true
        verified:
          type: boolean

    ExtractionRequest:
      type: object
      required: [strippedText, credentialType, fingerprint]
      properties:
        strippedText:
          type: string
          description: PII-stripped credential text (client-side stripping applied)
        credentialType:
          type: string
          enum: [DEGREE, LICENSE, CERTIFICATE, TRANSCRIPT, CLE, PROFESSIONAL, BADGE, ATTESTATION, FINANCIAL, LEGAL, INSURANCE, SEC_FILING, PATENT, REGULATION, PUBLICATION, OTHER]
        fingerprint:
          type: string
          description: SHA-256 hash of the original document
        issuerHint:
          type: string
          description: Optional issuer name hint

    ExtractionResult:
      type: object
      required: [fields, confidence, provider]
      properties:
        fields:
          type: object
          description: Extracted metadata fields
          properties:
            credentialType:
              type: string
            issuerName:
              type: string
            issuedDate:
              type: string
              format: date
            expiryDate:
              type: string
              format: date
            fieldOfStudy:
              type: string
            degreeLevel:
              type: string
            licenseNumber:
              type: string
            accreditingBody:
              type: string
            jurisdiction:
              type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        provider:
          type: string
        tokensUsed:
          type: integer

    CreateAttestationRequest:
      type: object
      required: [attestation_type, attester_name, subject_identifier, claims]
      properties:
        attestation_type:
          type: string
          enum: [VERIFICATION, ENDORSEMENT, AUDIT, APPROVAL, COMPLIANCE, SUPPLY_CHAIN, IDENTITY, WITNESS, CUSTOM]
          description: Category of attestation
        attester_name:
          type: string
          description: Name of the attesting party
        attester_type:
          type: string
          enum: [INSTITUTION, CORPORATION, INDIVIDUAL, REGULATORY, THIRD_PARTY]
          description: Type of attesting entity
        attester_title:
          type: string
          description: Optional title or role of the attester
        subject_type:
          type: string
          enum: [credential, entity, process, asset]
          description: What the attestation is about
        subject_identifier:
          type: string
          description: Public ID of the subject being attested to
        claims:
          type: array
          minItems: 1
          items:
            type: object
            required: [claim]
            properties:
              claim:
                type: string
                description: The assertion being made
              evidence:
                type: string
                description: Optional supporting evidence reference
          description: One or more structured claims
        summary:
          type: string
          description: Optional human-readable summary
        jurisdiction:
          type: string
          description: Optional jurisdiction code (e.g., US-CA). Omitted when null.
        expires_at:
          type: string
          format: date-time
          description: Optional ISO 8601 expiration timestamp
        evidence:
          type: array
          maxItems: 10
          description: Optional public evidence metadata attached to the attestation. The API stores metadata and fingerprints only, not document bytes.
          items:
            type: object
            additionalProperties: false
            required: [evidence_type, fingerprint]
            properties:
              evidence_type:
                type: string
                maxLength: 60
                default: document
              fingerprint:
                type: string
                pattern: "^[a-fA-F0-9]{64}$"
                description: SHA-256 fingerprint of the evidence artifact
              mime:
                type: string
                nullable: true
                description: MIME type of the evidence artifact, when known
              size:
                type: integer
                nullable: true
                minimum: 0
                description: Evidence artifact size in bytes, when known
              filename:
                type: string
                nullable: true
                maxLength: 255
                description: Public-safe evidence filename metadata only
              description:
                type: string
                nullable: true
                maxLength: 500
                description: Public-safe evidence description metadata only
        metadata:
          $ref: "#/components/schemas/AttestationMetadataInput"

    AttestationMetadataInput:
      type: object
      additionalProperties: false
      description: Optional PII-stripped metadata. Accepted only when ENABLE_AI_EXTRACTION is enabled.
      properties:
        template:
          type: string
          maxLength: 80
        credential_type:
          type: string
          maxLength: 100
        credential_sub_type:
          type: string
          maxLength: 100
        document_type:
          type: string
          maxLength: 100
        issuer_name:
          type: string
          maxLength: 200
        issuing_jurisdiction:
          type: string
          maxLength: 100
        issued_date:
          type: string
          maxLength: 40
        expiration_date:
          type: string
          maxLength: 40
        extraction_provider:
          type: string
          maxLength: 80
        extraction_confidence:
          type: number
          minimum: 0
          maximum: 1
        metadata_fingerprint:
          type: string
          pattern: "^[a-fA-F0-9]{64}$"

    CreateAttestationResponse:
      type: object
      required: [public_id, attestation_id, attestation_type, fingerprint, status, created_at, verify_url]
      properties:
        public_id:
          type: string
          description: Public identifier for the attestation
        attestation_id:
          type: string
          description: v1 back-compat alias for public_id; never an internal UUID
        attestation_type:
          type: string
          enum: [VERIFICATION, ENDORSEMENT, AUDIT, APPROVAL, COMPLIANCE, SUPPLY_CHAIN, IDENTITY, WITNESS, CUSTOM]
        fingerprint:
          type: string
          pattern: "^[a-fA-F0-9]{64}$"
          description: SHA-256 fingerprint of the attestation content
        status:
          type: string
          enum: [PENDING]
          description: Initial status (always PENDING)
        created_at:
          type: string
          format: date-time
        verify_url:
          type: string
          format: uri
          description: Direct URL to verify this attestation
        evidence_count:
          type: integer
          minimum: 0
          description: Number of evidence metadata rows accepted with the request
        warning:
          type: string
          description: Present only when the attestation was created but optional evidence metadata could not be attached

    AttestationDetail:
      type: object
      required: [public_id, attestation_type, status, subject_type, subject_identifier, attester, claims, evidence, evidence_count, created_at, verify_url]
      properties:
        public_id:
          type: string
        attestation_type:
          type: string
          enum: [VERIFICATION, ENDORSEMENT, AUDIT, APPROVAL, COMPLIANCE, SUPPLY_CHAIN, IDENTITY, WITNESS, CUSTOM]
        status:
          type: string
          enum: [PENDING, SECURED, REVOKED, EXPIRED]
        subject_type:
          type: string
          enum: [credential, entity, process, asset]
        subject_identifier:
          type: string
        fingerprint:
          type: string
          nullable: true
        evidence_fingerprint:
          type: string
          nullable: true
        attester:
          type: object
          required: [name, type]
          properties:
            name:
              type: string
            type:
              type: string
              enum: [INSTITUTION, CORPORATION, INDIVIDUAL, REGULATORY, THIRD_PARTY]
            title:
              type: string
        claims:
          type: array
          items:
            type: object
            required: [claim]
            properties:
              claim:
                type: string
              evidence:
                type: string
        summary:
          type: string
        jurisdiction:
          type: string
          description: Omitted when null (frozen schema)
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/AttestationEvidence"
        evidence_count:
          type: integer
          minimum: 0
        chain_proof:
          type: object
          nullable: true
          description: Present only when status is SECURED
          properties:
            tx_id:
              type: string
            block_height:
              type: integer
              nullable: true
            timestamp:
              type: string
              format: date-time
              nullable: true
            explorer_url:
              type: string
              format: uri
              nullable: true
        linked_credential:
          type: object
          nullable: true
          properties:
            public_id:
              type: string
            credential_type:
              type: string
              nullable: true
            verification_status:
              type: string
            verify_url:
              type: string
              format: uri
        attestor_credentials:
          type: array
          description: Present only when include=credentials is requested. Capped at the current linked credential plus two parent levels.
          items:
            $ref: "#/components/schemas/AttestorCredential"
        issued_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revocation_reason:
          type: string
          nullable: true
        verify_url:
          type: string
          format: uri

    AttestationEvidence:
      type: object
      required: [id, public_id, evidence_type, fingerprint, mime, size, created_at]
      properties:
        id:
          type: string
          pattern: "^AEV-[A-F0-9]{12}$"
          description: v1 back-compat alias for public_id; never an internal UUID
        public_id:
          type: string
          pattern: "^AEV-[A-F0-9]{12}$"
          description: Public evidence metadata identifier
        evidence_type:
          type: string
        description:
          type: string
          nullable: true
        fingerprint:
          type: string
          pattern: "^[a-fA-F0-9]{64}$"
        mime:
          type: string
          nullable: true
        size:
          type: integer
          nullable: true
          minimum: 0
        created_at:
          type: string
          format: date-time

    AttestorCredential:
      type: object
      required: [public_id, status, is_current, chain_proof, record_uri]
      properties:
        public_id:
          type: string
        credential_type:
          type: string
          nullable: true
        status:
          type: string
        fingerprint:
          type: string
          nullable: true
        version_number:
          type: integer
          nullable: true
        parent_public_id:
          type: string
          nullable: true
        is_current:
          type: boolean
        chain_proof:
          type: object
          nullable: true
          properties:
            tx_id:
              type: string
            block_height:
              type: integer
              nullable: true
            timestamp:
              type: string
              format: date-time
              nullable: true
            explorer_url:
              type: string
              format: uri
              nullable: true
        record_uri:
          type: string
          format: uri

    AttestationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [public_id, attestation_type, status, attester_name, subject_type, subject_identifier, created_at]
            properties:
              public_id:
                type: string
              attestation_type:
                type: string
                enum: [VERIFICATION, ENDORSEMENT, AUDIT, APPROVAL, COMPLIANCE, SUPPLY_CHAIN, IDENTITY, WITNESS, CUSTOM]
              status:
                type: string
                enum: [PENDING, SECURED, REVOKED, EXPIRED]
              attester_name:
                type: string
              subject_type:
                type: string
                enum: [credential, entity, process, asset]
              subject_identifier:
                type: string
              summary:
                type: string
              created_at:
                type: string
                format: date-time
              anchored_at:
                type: string
                format: date-time
                nullable: true
        next_cursor:
          type: string
          nullable: true
          description: Cursor for next page, null if no more results

    RevokeAttestationResponse:
      type: object
      required: [public_id, status, revoked_at]
      properties:
        public_id:
          type: string
        status:
          type: string
          enum: [REVOKED]
        revoked_at:
          type: string
          format: date-time

    BatchVerifyAttestationsRequest:
      type: object
      required: [public_ids]
      properties:
        public_ids:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          description: List of attestation public IDs to verify

    BatchVerifyAttestationsResponse:
      type: object
      required: [results, summary]
      properties:
        results:
          type: array
          items:
            type: object
            required: [public_id]
            properties:
              public_id:
                type: string
              status:
                type: string
                enum: [PENDING, SECURED, REVOKED, EXPIRED]
              attestation_type:
                type: string
                enum: [VERIFICATION, ENDORSEMENT, AUDIT, APPROVAL, COMPLIANCE, SUPPLY_CHAIN, IDENTITY, WITNESS, CUSTOM]
              attester_name:
                type: string
              anchored_at:
                type: string
                format: date-time
                nullable: true
              expires_at:
                type: string
                format: date-time
                nullable: true
              error:
                type: string
                description: Present when attestation could not be found
        summary:
          type: object
          required: [total, verified, not_found, expired, revoked]
          properties:
            total:
              type: integer
            verified:
              type: integer
              description: Count of SECURED attestations
            not_found:
              type: integer
            expired:
              type: integer
            revoked:
              type: integer

    ErrorResponse:
      type: object
      properties:
        verified:
          type: boolean
          example: false
        error:
          type: string

    PaymentRequired:
      type: object
      properties:
        error:
          type: string
          example: payment_required
        x402:
          type: object
          properties:
            version:
              type: string
            price:
              type: string
            payeeAddress:
              type: string
            network:
              type: string
